server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers (HTTPS-ul îl face Traefik, deci HSTS îl pun pe ingress) ──
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  # CSP: permite doar resursele de care avem nevoie (Google Fonts + api.github.com pentru PAT flow)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://avatars.githubusercontent.com https://*.githubusercontent.com; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # ascunde versiunea nginx
  server_tokens off;

  # gzip pentru tot ce nu e deja compresat
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # SPA fallback: tot ce nu există ca fișier merge la index.html (React Router-friendly)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets cu fingerprint din Vite (hash în nume = safe immutable)
  location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # index.html nu se cache-uie agresiv ca să prindă deploy-uri noi
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # llms.txt accesibil pentru AI crawlers
  location = /llms.txt {
    add_header Content-Type "text/plain; charset=utf-8";
    add_header Cache-Control "public, max-age=3600";
  }

  # health check pentru k8s probes
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
