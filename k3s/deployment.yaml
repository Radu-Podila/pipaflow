apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipaflow
  namespace: pipaflow
  labels:
    app: pipaflow
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: pipaflow
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pipaflow
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: pipaflow
          image: registry.tpforge.com/pipaflow:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
